# ─── GTM Agent Integration Config ───
# Tell the agents which services you use. Pick one per category.
# On Attention, agents run natively (ask_attention + subtools). On any other
# recorder, the /run-agent runner translates those calls to your CRM + transcripts
# (via the gtmsi adapters), so every agent works with any CRM and any call recorder.
#
# Easiest way to fill this in: run /setup (it asks 5 quick questions, detects what it
# can from your connected tools, and writes this file). Or edit by hand below.
# Until `configured` is true, /run-agent confirms your stack before it runs anything,
# instead of assuming the defaults below.
configured: false

# Agent builder — where you assemble/run these agents. Drives the two build paths:
#   attention  -> import the native agent-builder flow (agents/<fn>/<agent>.activepieces.json)
#   anything else -> /build-agent reads the spec and generates the implementation for your builder
agent_builder: attention
# Options: attention, n8n, make, zapier, langgraph, claude, other

# After setup: import on Attention, or run /build-agent agents/<category>/<agent>.md on any other builder.

# CRM — where your pipeline and account data lives
crm: salesforce
# Options: salesforce, hubspot, pipedrive, zoho, attio, close, dynamics

# Communication — where your team collaborates
communication: slack
# Options: slack, teams

# Call recorder — where your sales conversations are recorded and analyzed
# We recommend Attention (attention.com) for the best agent experience: clean,
# role- and CRM-labeled, re-stitched transcripts out of the box. Any recorder works
# though — those that only export transcripts ingest via the gtmsi adapters.
call_recorder: attention
# Options: attention, gong, chorus, fireflies, otter, grain, recall (or any via adapters)

# Email — how you send follow-ups and outbound
email: gmail
# Options: gmail, outlook

# Calendar — where meetings are scheduled
calendar: google_calendar
# Options: google_calendar, outlook_calendar
